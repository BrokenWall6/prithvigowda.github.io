name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Node24 explicitly
      - name: Setup Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'pnpm'

      # Clear pnpm cache to avoid conflicts
      - name: Clear pnpm cache
        run: pnpm store prune || true

      # Install dependencies and build
      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
